document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"padding: 0 40px 56px 40px;\">\n        <p data-reveal=\"\" style=\"font-size: 12px; color: #7A736A; line-height: 1.9;\">Inspired by<br>traditional systems.<br>Designed for<br>contemporary life.<\u002Fp>\n        <div style=\"width: 48px; height: 1px; background: #AE4C33; margin: 18px 0;\"><\u002Fdiv>\n        <a class=\"moenga-navlink\" href=\"#philosophy\" style=\"font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: #7A736A;\">Read our philosophy&nbsp;&nbsp;→<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- MOSAIC STRIP -->\n  <section data-mosaic=\"\" style=\"display: grid; grid-template-columns: repeat(4, 1fr); width: 100%;\">\n    <div style=\"height: 340px; overflow: hidden;\">\n      <image-slot id=\"mosaic-photo\" style=\"width: 124%; height: 100%; display: block; will-change: transform;\" shape=\"rect\" fit=\"cover\" placeholder=\"RAW STONE TEXTURE · CLOSE-UP\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div style=\"height: 340px; background: #F0EDE7; display: flex; flex-direction: column; justify-content: center; padding: 48px;\">\n      <div data-reveal=\"\" style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 30px; line-height: 1.25; color: #1A1714;\">Balance.<br>Precision.<br>Purpose.<\u002Fdiv>\n      <div style=\"width: 48px; height: 1px; background: #AE4C33; margin-top: 22px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height: 340px; background: #2A2420; display: flex; flex-direction: column; justify-content: center; padding: 48px;\">\n      <div data-reveal=\"\" style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 23px; line-height: 1.45; color: #F0EDE7;\">Engineering<br>that respects<br>space, people<br>and materials.<\u002Fdiv>\n      <div style=\"width: 48px; height: 1px; background: #AE4C33; margin-top: 22px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height: 340px; background: #F0EDE7; display: flex; align-items: center; justify-content: center; border-left: 1px solid #C8BFB0;\">\n      <svg width=\"120\" height=\"120\" viewBox=\"0 0 120 120\" fill=\"none\" aria-hidden=\"true\">\n        <circle cx=\"60\" cy=\"60\" r=\"50\" stroke=\"#AE4C33\" stroke-width=\"1\" fill=\"none\"><\u002Fcircle>\n        <circle cx=\"60\" cy=\"60\" r=\"3\" fill=\"#AE4C33\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PHILOSOPHY -->\n  <section id=\"philosophy\" style=\"background: #F7F4EF; padding: 150px 48px;\">\n    <div data-philo=\"\" style=\"max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 80px;\">\n      <div data-reveal=\"\">\n        <div style=\"font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #7A736A;\">The Philosophy<\u002Fdiv>\n        <div style=\"width: 8px; height: 80px; background: #AE4C33; margin-top: 26px;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h2 data-reveal=\"\" style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 56px; line-height: 1.08; color: #1A1714;\">Stripping away the noise.<\u002Fh2>\n        <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"margin-top: 34px; max-width: 580px; display: flex; flex-direction: column; gap: 22px; font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 16px; line-height: 1.9; color: #6E665C;\">\n          <p style=\"text-wrap: pretty;\">A <em style=\"font-style: italic; color: #1A1714;\">moenga<\u002Fem> is a traditional mill mechanism — pure, mechanical, and essential. We apply that same philosophy to engineering.<\u002Fp>\n          <p style=\"text-wrap: pretty;\">We don't sell complex construction packages or heavy corporate red tape.<\u002Fp>\n          <p style=\"text-wrap: pretty;\">We provide raw, honest, and independent technical advice. We help private clients navigate structural choices, optimize indoor wellness, and implement clean, minimalist engineering solutions that respect both nature and architecture.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES / EXPERTISE -->\n  <section id=\"expertise\" style=\"background: #F0EDE7; padding: 120px 48px;\">\n    <div style=\"max-width: 1200px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #7A736A; margin-bottom: 18px;\">Expertise<\u002Fdiv>\n      <div style=\"width: 100%; height: 1px; background: #C8BFB0;\"><\u002Fdiv>\n\n      <div data-services=\"\" style=\"display: grid; grid-template-columns: 1fr 1px 1fr; margin-top: 64px;\">\n        <!-- Col A -->\n        <div data-reveal=\"\" style=\"padding-right: 72px;\">\n          <div style=\"font-size: 11px; letter-spacing: .14em; color: #AE4C33;\">01&nbsp;/&nbsp;TECHNICAL ADVISORY<\u002Fdiv>\n          <h3 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 30px; line-height: 1.15; color: #1A1714; margin-top: 22px;\">Structural clarity for<br>property decisions.<\u002Fh3>\n          <p style=\"font-size: 14px; color: #7A736A; line-height: 1.85; margin-top: 22px;\">Clear, data-driven support for your property decisions. Whether you are assessing a historic Lisbon building before purchase or facing a complex structural challenge during a renovation, we provide independent engineering clarity.<\u002Fp>\n          <div style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 30px; font-size: 13px; color: #6E665C;\">\n            <div>—&nbsp;&nbsp;Structural health evaluations<\u002Fdiv>\n            <div>—&nbsp;&nbsp;Material performance advice<\u002Fdiv>\n            <div>—&nbsp;&nbsp;Clean, problem-solving technical support<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-svc-rule=\"\" style=\"background: #C8BFB0;\"><\u002Fdiv>\n        <!-- Col B -->\n        <div data-reveal=\"\" data-reveal-delay=\"120\" data-services-col-b=\"\" style=\"padding-left: 72px;\">\n          <div style=\"font-size: 11px; letter-spacing: .14em; color: #AE4C33;\">02&nbsp;/&nbsp;HEALTHY BUILDING SUPPORT<\u002Fdiv>\n          <h3 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 30px; line-height: 1.15; color: #1A1714; margin-top: 22px;\">Engineering how<br>a space feels.<\u002Fh3>\n          <p style=\"font-size: 14px; color: #7A736A; line-height: 1.85; margin-top: 22px;\">Engineering the invisible elements that dictate how a space feels. We advise on passive strategies to ensure your building breathes, resists moisture naturally, and maintains optimal indoor wellness without relying on heavy, artificial systems.<\u002Fp>\n          <div style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 30px; font-size: 13px; color: #6E665C;\">\n            <div>—&nbsp;&nbsp;Moisture and mold prevention consulting<\u002Fdiv>\n            <div>—&nbsp;&nbsp;Natural ventilation and climate strategies<\u002Fdiv>\n            <div>—&nbsp;&nbsp;Non-toxic, raw material recommendations<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"width: 100%; height: 1px; background: #C8BFB0; margin-top: 72px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"padding: 130px 48px; background-color: #f1e8d5\">\n    <div style=\"max-width: 640px; margin: 0 auto; text-align: center;\">\n      <div data-reveal=\"\" style=\"font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #8A7E6A;\">Contact<\u002Fdiv>\n      <h2 data-reveal=\"\" data-reveal-delay=\"80\" style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 52px; line-height: 1.08; color: #1A1714; margin-top: 18px;\">Bring clarity to your project.<\u002Fh2>\n      <p data-reveal=\"\" data-reveal-delay=\"140\" style=\"font-size: 14px; color: #7A736A; line-height: 1.8; margin-top: 18px;\">Let's discuss your building's technical needs over a clean solution.<\u002Fp>\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top: 48px; padding: 40px; border: 1px solid #AE4C33;\">\n          <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 28px; color: #1A1714;\">Thank you.<\u002Fdiv>\n          <p style=\"font-size: 13px; color: #7A736A; line-height: 1.8; margin-top: 12px;\">Your message has been noted. We'll respond with clarity, shortly.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ onSubmit }}\" style=\"margin-top: 48px; text-align: left; display: flex; flex-direction: column; gap: 30px;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 30px;\">\n          <div>\n            <label for=\"m-name\" style=\"display: block; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #8A7E6A; margin-bottom: 8px;\">Name<\u002Flabel>\n            <input class=\"moenga-field\" id=\"m-name\" name=\"name\" type=\"text\" required=\"\" placeholder=\"Your name\">\n          <\u002Fdiv>\n          <div>\n            <label for=\"m-email\" style=\"display: block; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #8A7E6A; margin-bottom: 8px;\">Email<\u002Flabel>\n            <input class=\"moenga-field\" id=\"m-email\" name=\"email\" type=\"email\" required=\"\" placeholder=\"you@email.com\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label for=\"m-type\" style=\"display: block; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #8A7E6A; margin-bottom: 8px;\">Project type<\u002Flabel>\n          <select class=\"moenga-field\" id=\"m-type\" name=\"type\">\n            <option>Technical Advisory<\u002Foption>\n            <option>Healthy Building Support<\u002Foption>\n            <option>Other<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div>\n          <label for=\"m-msg\" style=\"display: block; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #8A7E6A; margin-bottom: 8px;\">Message<\u002Flabel>\n          <textarea class=\"moenga-field\" id=\"m-msg\" name=\"message\" rows=\"3\" placeholder=\"Tell us about your building or project\" style=\"resize: vertical;\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button class=\"moenga-submit\" type=\"submit\" style=\"align-self: flex-start; margin-top: 6px;\">Book a Consultation<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <div style=\"margin-top: 56px; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; font-size: 11px; letter-spacing: .04em; color: #8A7E6A;\">\n        <span>Lisbon, Portugal<\u002Fspan>\n        <span>English&nbsp;·&nbsp;Português&nbsp;·&nbsp;Français<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background: #1A1714; padding: 88px 48px 40px;\">\n    <div data-footer-grid=\"\" style=\"max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 56px;\">\n      <div>\n        <img src=\"d59df06d-2ad6-45a1-b0ac-d359fe45db6c\" alt=\"Moenga Consulting Studio\" style=\"height: 46px; width: auto; display: block;\">\n        <div style=\"font-size: 12px; color: #8C8377; margin-top: 26px; line-height: 1.9;\">Lisbon, Portugal<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <a class=\"moenga-navlink\" href=\"#philosophy\" style=\"font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #B7AEA2; width: fit-content;\">The Philosophy<\u002Fa>\n        <a class=\"moenga-navlink\" href=\"#expertise\" style=\"font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #B7AEA2; width: fit-content;\">Expertise<\u002Fa>\n        <a class=\"moenga-navlink\" href=\"#contact\" style=\"font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #B7AEA2; width: fit-content;\">Contact<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <a class=\"moenga-navlink\" href=\"mailto:studio@moenga.pt\" style=\"font-size: 12px; color: #B7AEA2; width: fit-content;\">studio@moenga.pt<\u002Fa>\n        <a class=\"moenga-navlink\" href=\"#\" style=\"font-size: 12px; color: #B7AEA2; width: fit-content;\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1200px; margin: 64px auto 0; padding-top: 28px; border-top: 1px solid rgba(200,191,176,.22); text-align: center; font-size: 10px; letter-spacing: .06em; color: #6E665C;\">© 2025 Moenga Consulting Studio. All rights reserved.<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.rootRef = React.createRef();\n    this.navRef = React.createRef();\n    this.state = { submitted: false };\n  }\n\n  componentDidMount() {\n    const root = this.rootRef.current;\n    const nav = this.navRef.current;\n    if (!root) return;\n\n    // Nav on scroll + horizontal parallax on hero photo — rAF-throttled, no re-render\n    const heroEl = root.querySelector('#top');\n    const heroPhoto = root.querySelector('#hero-photo');\n    const mosaicPhoto = root.querySelector('#mosaic-photo');\n    let ticking = false;\n    const update = () => {\n      ticking = false;\n      const rect = heroEl ? heroEl.getBoundingClientRect() : null;\n      const scrolled = rect ? -rect.top : 0;\n      if (nav) {\n        if (scrolled > 60) {\n          nav.style.background = '#F0EDE7';\n          nav.style.borderBottomColor = '#C8BFB0';\n        } else {\n          nav.style.background = 'transparent';\n          nav.style.borderBottomColor = 'transparent';\n        }\n      }\n      if (rect && heroPhoto && heroPhoto.parentElement) {\n        const h = rect.height || window.innerHeight;\n        const p = Math.min(Math.max(scrolled / h, 0), 1);\n        const maxShift = heroPhoto.offsetWidth - heroPhoto.parentElement.clientWidth;\n        heroPhoto.style.transform = 'translateX(' + (-p * maxShift).toFixed(2) + 'px)';\n      }\n      // Mosaic photo: pan as it crosses the viewport\n      if (mosaicPhoto && mosaicPhoto.parentElement) {\n        const vh = window.innerHeight;\n        const mr = mosaicPhoto.parentElement.getBoundingClientRect();\n        const mp = Math.min(Math.max((vh - mr.top) / (vh + mr.height), 0), 1);\n        const ms = mosaicPhoto.offsetWidth - mosaicPhoto.parentElement.clientWidth;\n        mosaicPhoto.style.transform = 'translateX(' + (-(1 - mp) * ms).toFixed(2) + 'px)';\n      }\n    };\n    const onScroll = () => {\n      if (!ticking) {\n        ticking = true;\n        window.requestAnimationFrame(update);\n      }\n    };\n    // capture:true catches scroll from whichever ancestor container actually scrolls\n    window.addEventListener('scroll', onScroll, { passive: true, capture: true });\n    window.addEventListener('resize', onScroll, { passive: true });\n    update();\n    this._onScroll = onScroll;\n\n    // Scroll reveal — apply hidden state only if JS runs (no-JS shows all)\n    const els = Array.from(root.querySelectorAll('[data-reveal]'));\n    els.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(20px)';\n      el.style.transition = 'opacity .65s ease, transform .65s ease';\n      el.style.willChange = 'opacity, transform';\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const d = parseInt(el.getAttribute('data-reveal-delay') || '0', 10);\n          el.style.transitionDelay = d + 'ms';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach((el) => io.observe(el));\n    this._io = io;\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) { window.removeEventListener('scroll', this._onScroll, { capture: true }); window.removeEventListener('resize', this._onScroll); }\n    if (this._io) this._io.disconnect();\n  }\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      navRef: this.navRef,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      onSubmit: (e) => {\n        e.preventDefault();\n        this.setState({ submitted: true });\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
